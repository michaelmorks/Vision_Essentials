<!DOCTYPE html>
<html>
<head>
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #ffffff;
    }

    h1 {
      color: #000000;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .home-btn {
      display: inline-block;
      background: #000000;
      color: white;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 16px;
      transition: 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .home-btn:hover {
      background: #6000b5;
      transform: translateY(-2px);
    }

    .checkmark {
      font-size: 50px;
      color: #00b521;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div>
    <div class="checkmark">✔</div>
    <h1>You're all set!</h1>
    <p>We’ve received your Inquiry and will get back to you shortly.</p>
    <a href="index.html" class="home-btn">Return To Home Page</a>
  </div>

</body>
</html>
